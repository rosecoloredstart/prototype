.overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,4,2,0.2) 0%, rgba(8,4,2,0.05) 50%, rgba(8,4,2,0.45) 100%); }
.fx { position: absolute; inset: 0; pointer-events: none; }
.particle { position: absolute; border-radius: 2px; background: rgba(160,190,220,0.35); animation: fall linear infinite; }
.dust { position: absolute; border-radius: 50%; background: rgba(255,220,150,0.12); animation: float ease-in-out infinite; }
@keyframes fall { from { transform: translateY(-10px) translateX(0); opacity: 0.5; } to { transform: translateY(110vh) translateX(-15px); opacity: 0; } }
@keyframes float { 0%,100% { transform: translateY(0) translateX(0); opacity: 0.08; } 33% { transform: translateY(-14px) translateX(7px); opacity: 0.25; } 66% { transform: translateY(-7px) translateX(-5px); opacity: 0.15; } }
@keyframes flicker { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } 25%,75% { opacity: 0.88; } }
@keyframes drift { 0%,100% { transform: translateX(0) translateY(0); } 50% { transform: translateX(8px) translateY(-5px); } }
.glow { position: absolute; border-radius: 50%; filter: blur(50px); animation: flicker ease-in-out infinite; }
.label { position: absolute; bottom: 24px; left: 24px; color: rgba(240,220,180,0.65); font-family: Georgia, serif; font-style: italic; font-size: 13px; letter-spacing: 1.5px; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
.music-btn { position: absolute; top: 16px; right: 16px; width: 38px; height: 38px; border-radius: 50%; background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.55); font-size: 15px; transition: all 0.3s; user-select: none; }
</style>
</head>
<body>
<div class="scene">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="glow" style="width:140px;height:140px;background:rgba(255,160,40,0.14);top:22%;left:8%;animation-duration:4s;animation-delay:0s;"></div>
  <div class="glow" style="width:90px;height:90px;background:rgba(255,180,60,0.1);top:18%;left:55%;animation-duration:5.5s;animation-delay:1.2s;"></div>
  <div class="fx" id="fx"></div>
  <div class="label">café. rain. focus.</div>
  <div class="music-btn" id="btn" onclick="toggleMusic()">♪</div>
  <audio id="audio" loop src="https://raw.githubusercontent.com/rosecoloredstart/prototype/main/mondamusic-lofi-lofi-girl-lofi-chill-512853.mp3"></audio>
</div>
<script>

const fx = document.getElementById('fx');
for (let i = 0; i < 65; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.width = '1px';
  p.style.height = (Math.random() * 14 + 8) + 'px';
  p.style.animationDuration = (Math.random() * 1.2 + 0.7) + 's';
  p.style.animationDelay = (Math.random() * 3) + 's';
  fx.appendChild(p);
}
for (let i = 0; i < 18; i++) {
  const d = document.createElement('div');
  d.className = 'dust';
  const s = Math.random() * 5 + 2;
  d.style.cssText = 'width:'+s+'px;height:'+s+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation-duration:'+(Math.random()*7+4)+'s;animation-delay:'+(Math.random()*5)+'s;';
  fx.appendChild(d);
}
let on = false;
const audio = document.getElementById('audio');
const btn = document.getElementById('btn');
function toggleMusic() {
  if (on) { audio.pause(); btn.textContent='♪'; btn.style.color='rgba(255,255,255,0.55)'; btn.style.borderColor='rgba(255,255,255,0.12)'; }
  else { audio.play().catch(()=>{}); btn.textContent='■'; btn.style.color='rgba(200,144,74,1)'; btn.style.borderColor='rgba(200,144,74,0.4)'; }
  on = !on;
}
</script>
